<div class="slide-header" data-animate="fade-up">
  <span class="slide-kicker">{{ slide.eyebrow | default('') }}</span>
  <h1 class="slide-title">{{ slide.title }}</h1>
</div>

<div class="card-grid" style="flex: 1; align-content: center;">
  {% for item in slide.data['items'] %}
  <div class="content-panel" data-animate="fade-up">
    <div class="flex items-center gap-4" style="margin-bottom: 12px;">
      <span class="badge badge-{{ item.color | default('blue') }}" style="margin: 0;">{{ loop.index }}</span>
      <h3 class="item-title">{{ item.title }}</h3>
    </div>
    <p class="small-copy">{{ item.description }}</p>
  </div>
  {% endfor %}
</div>
