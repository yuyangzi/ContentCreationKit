<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>
  <style>
    :root {
      --bg: #0b0d12;
      --bg-2: #10151d;
      --surface: #141922;
      --surface-2: #191f2b;
      --panel: rgba(20, 25, 34, 0.92);
      --panel-strong: rgba(25, 31, 43, 0.98);
      --panel-border: rgba(235, 241, 255, 0.11);
      --panel-border-strong: rgba(235, 241, 255, 0.2);
      --text-primary: #f5f7fb;
      --text-secondary: #b6c0cf;
      --text-muted: #748093;
      --accent-orange: #f59e0b;
      --accent-blue: #5aa9ff;
      --accent-green: #39d98a;
      --accent-purple: #a78bfa;
      --accent-red: #ff6b6b;
      --accent-pink: #f472b6;
      --accent-cyan: #2dd4bf;
      --shadow-soft: 0 24px 70px rgba(0, 0, 0, 0.28);
      --slide-padding-x: 88px;
      --slide-padding-y: 58px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
      color: var(--text-primary);
    }

    body {
      background:
        linear-gradient(135deg, rgba(45, 212, 191, 0.06), transparent 34%),
        linear-gradient(315deg, rgba(245, 158, 11, 0.05), transparent 40%),
        linear-gradient(180deg, var(--bg), var(--bg-2)),
        linear-gradient(rgba(245,247,251,0.032) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,247,251,0.032) 1px, transparent 1px);
      background-size: 100% 100%, 100% 100%, 100% 100%, 44px 44px, 44px 44px;
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    .slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      padding: var(--slide-padding-y) var(--slide-padding-x);
      opacity: 0;
      transition: opacity 0.4s ease;
      overflow: hidden;
    }

    .slide.is-active {
      display: flex;
      flex-direction: column;
      opacity: 1;
    }

    .slide.is-exit {
      opacity: 0;
    }

    .slide-content {
      flex: 1;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 0;
    }

    .slide-shell {
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 32px;
    }

    .slide-shell--center {
      align-items: center;
      text-align: center;
    }

    .slide-shell--split {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(520px, 0.82fr);
      align-items: center;
      gap: 60px;
    }

    .slide-header {
      max-width: 1240px;
      margin-bottom: 8px;
    }

    .slide-header--center {
      margin-left: auto;
      margin-right: auto;
      text-align: center;
    }

    .slide-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 20px;
      font-size: 14px;
      letter-spacing: 0.02em;
      color: var(--text-muted);
    }

    .page-indicator {
      font-variant-numeric: tabular-nums;
    }

    /* Typography */
    .slide-kicker,
    .eyebrow {
      display: inline-block;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent-orange);
      margin-bottom: 14px;
    }

    .slide-title {
      max-width: 1180px;
      font-size: 54px;
      font-weight: 760;
      line-height: 1.16;
      margin-bottom: 18px;
      letter-spacing: 0;
      text-wrap: balance;
      overflow-wrap: anywhere;
    }

    .slide-subtitle {
      max-width: 1080px;
      font-size: 25px;
      color: var(--text-secondary);
      line-height: 1.52;
      overflow-wrap: anywhere;
    }

    .cover-title {
      max-width: 1240px;
      font-size: 74px;
      font-weight: 820;
      line-height: 1.1;
      margin-bottom: 24px;
      letter-spacing: 0;
      text-wrap: balance;
      overflow-wrap: anywhere;
    }

    .cover-subtitle {
      max-width: 1040px;
      font-size: 27px;
      color: var(--text-secondary);
      line-height: 1.58;
      overflow-wrap: anywhere;
    }

    .big-number {
      font-size: 104px;
      font-weight: 820;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    /* Panels */
    .panel,
    .content-panel {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      padding: 32px;
      box-shadow: var(--shadow-soft);
    }

    .content-panel {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 0;
    }

    .content-panel--large {
      padding: 42px 48px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 22px;
      align-items: stretch;
    }

    .metric-card {
      min-width: 0;
      border-top: 3px solid var(--accent-blue);
    }

    .comparison-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 72px minmax(0, 1fr);
      align-items: center;
      gap: 28px;
      flex: 1;
    }

    .section-center {
      max-width: 1240px;
      margin: 0 auto;
      text-align: center;
    }

    /* Badges */
    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      font-size: 20px;
      font-weight: 700;
      margin-right: 16px;
      flex-shrink: 0;
    }

    .badge-orange { background: rgba(255, 157, 61, 0.15); color: var(--accent-orange); border: 1px solid rgba(255, 157, 61, 0.3); }
    .badge-blue { background: rgba(77, 182, 255, 0.15); color: var(--accent-blue); border: 1px solid rgba(77, 182, 255, 0.3); }
    .badge-green { background: rgba(74, 222, 128, 0.15); color: var(--accent-green); border: 1px solid rgba(74, 222, 128, 0.3); }
    .badge-purple { background: rgba(167, 139, 250, 0.15); color: var(--accent-purple); border: 1px solid rgba(167, 139, 250, 0.3); }
    .badge-red { background: rgba(255, 107, 92, 0.15); color: var(--accent-red); border: 1px solid rgba(255, 107, 92, 0.3); }
    .badge-pink { background: rgba(232, 91, 122, 0.15); color: var(--accent-pink); border: 1px solid rgba(232, 91, 122, 0.3); }

    /* Chips */
    .chip {
      display: inline-flex;
      align-items: center;
      padding: 12px 20px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      font-size: 19px;
      color: var(--text-primary);
      overflow-wrap: anywhere;
    }

    .chip-stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Arrows */
    .arrow-down {
      width: 32px;
      height: 32px;
      border-right: 3px solid var(--accent-cyan);
      border-bottom: 3px solid var(--accent-cyan);
      transform: rotate(45deg);
      margin: 16px auto;
    }

    .arrow-right {
      width: 32px;
      height: 32px;
      border-right: 3px solid var(--accent-green);
      border-bottom: 3px solid var(--accent-green);
      transform: rotate(-45deg);
      margin: auto;
    }

    /* Callouts */
    .callout {
      padding: 20px 24px;
      border-left: 4px solid var(--accent-green);
      background: rgba(74, 222, 128, 0.06);
      border-radius: 0 8px 8px 0;
      font-size: 20px;
      line-height: 1.6;
      overflow-wrap: anywhere;
    }

    .callout-orange { border-left-color: var(--accent-orange); background: rgba(255, 157, 61, 0.06); }

    /* Animations */
    [data-animate] {
      opacity: 0;
      transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);
    }

    [data-animate="fade-up"] { transform: translateY(40px); }
    [data-animate="fade-left"] { transform: translateX(40px); }
    [data-animate="fade-right"] { transform: translateX(-40px); }
    [data-animate="scale-in"] { transform: scale(0.9); }

    [data-animate].is-visible {
      opacity: 1;
      transform: none;
    }

    .no-animation [data-animate] {
      opacity: 1;
      transform: none;
      transition: none;
    }

    /* Utility */
    .text-orange { color: var(--accent-orange); }
    .text-blue { color: var(--accent-blue); }
    .text-green { color: var(--accent-green); }
    .text-purple { color: var(--accent-purple); }
    .text-red { color: var(--accent-red); }
    .text-pink { color: var(--accent-pink); }
    .text-muted { color: var(--text-muted); }
    .text-secondary { color: var(--text-secondary); }

    .flex { display: flex; }
    .flex-col { flex-direction: column; }
    .items-center { align-items: center; }
    .justify-center { justify-content: center; }
    .justify-between { justify-content: space-between; }
    .gap-4 { gap: 16px; }
    .gap-6 { gap: 24px; }
    .gap-8 { gap: 32px; }
    .flex-1 { flex: 1; }

    .mt-4 { margin-top: 16px; }
    .mt-6 { margin-top: 24px; }
    .mt-8 { margin-top: 32px; }
    .mb-4 { margin-bottom: 16px; }
    .mb-6 { margin-bottom: 24px; }

    .text-center { text-align: center; }
    .code { font-family: 'Fira Code', 'SF Mono', monospace; color: var(--accent-cyan); }

    .body-copy {
      font-size: 27px;
      color: var(--text-secondary);
      line-height: 1.72;
      white-space: pre-line;
      overflow-wrap: anywhere;
    }

    .small-copy {
      font-size: 18px;
      color: var(--text-secondary);
      line-height: 1.58;
      overflow-wrap: anywhere;
    }

    .item-title {
      font-size: 24px;
      line-height: 1.28;
      overflow-wrap: anywhere;
    }

    .item-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .item-row {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 18px 0;
      border-bottom: 1px solid rgba(245,247,251,0.07);
      font-size: 25px;
      line-height: 1.42;
      overflow-wrap: anywhere;
    }

    .item-row:last-child {
      border-bottom: 0;
    }

    .timeline {
      position: relative;
      padding-left: 34px;
    }

    .timeline::before {
      content: "";
      position: absolute;
      left: 11px;
      top: 6px;
      bottom: 6px;
      width: 2px;
      background: rgba(245,247,251,0.12);
    }

    .timeline-item {
      position: relative;
      display: flex;
      gap: 24px;
      margin-bottom: 28px;
    }

    .timeline-item:last-child {
      margin-bottom: 0;
    }

    .timeline-dot {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--accent-blue);
      flex-shrink: 0;
      position: relative;
      z-index: 1;
      box-shadow: 0 0 0 7px var(--surface);
    }

    @media (max-width: 1100px) {
      :root {
        --slide-padding-x: 42px;
        --slide-padding-y: 36px;
      }

      .slide-shell--split,
      .comparison-grid {
        grid-template-columns: 1fr;
      }

      .arrow-right {
        transform: rotate(45deg);
      }
    }
  </style>
  {% if echarts_needed %}
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  {% endif %}
</head>
<body>
  <div id="app">
    {% for slide in slides %}
    <section class="slide" data-index="{{ loop.index0 }}" data-transition="{{ slide.transition | default('fade') }}" {% if loop.first %}style="display:flex;opacity:1;"{% endif %}>
      <div class="slide-content">
        {% include slide.template %}
      </div>
      <div class="slide-footer">
        <span class="source">{{ slide.source | default('') }}</span>
        <span class="page-indicator">{{ loop.index }} / {{ loop.length }}</span>
      </div>
    </section>
    {% endfor %}
  </div>

  <script>
    (function() {
      const slides = document.querySelectorAll('.slide');
      let current = 0;
      const total = slides.length;

      function showSlide(index) {
        if (index < 0 || index >= total) return;
        slides[current].classList.remove('is-active');
        slides[current].style.display = 'none';
        slides[current].style.opacity = '0';
        current = index;
        slides[current].style.display = 'flex';
        // force reflow
        void slides[current].offsetWidth;
        slides[current].classList.add('is-active');
        slides[current].style.opacity = '1';
        window.location.hash = 'slide-' + (current + 1);
        triggerAnimations(slides[current]);
      }

      function next() { showSlide(current + 1); }
      function prev() { showSlide(current - 1); }

      function triggerAnimations(slide) {
        const animated = slide.querySelectorAll('[data-animate]');
        animated.forEach((el, i) => {
          el.classList.remove('is-visible');
          setTimeout(() => {
            el.classList.add('is-visible');
          }, 100 + i * 120);
        });

        const counters = slide.querySelectorAll('[data-count]');
        counters.forEach(el => {
          const target = parseInt(el.dataset.count, 10);
          animateNumber(el, target, 1500);
        });
      }

      function animateNumber(el, target, duration) {
        const start = performance.now();
        function easeOutQuart(t) { return 1 - Math.pow(1 - t, 4); }
        function step(now) {
          const p = Math.min((now - start) / duration, 1);
          el.textContent = Math.floor(target * easeOutQuart(p)).toLocaleString();
          if (p < 1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
      }

      document.addEventListener('keydown', e => {
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
          e.preventDefault();
          next();
        } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
          e.preventDefault();
          prev();
        } else if (e.key === 'Home') {
          e.preventDefault();
          showSlide(0);
        } else if (e.key === 'End') {
          e.preventDefault();
          showSlide(total - 1);
        }
      });

      let touchStartX = 0;
      document.addEventListener('touchstart', e => {
        touchStartX = e.touches[0].clientX;
      });
      document.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - touchStartX;
        if (dx < -50) next();
        if (dx > 50) prev();
      });

      // hash support
      const hashMatch = window.location.hash.match(/slide-(\d+)/);
      if (hashMatch) {
        showSlide(Math.max(0, Math.min(total - 1, parseInt(hashMatch[1], 10) - 1)));
      } else {
        triggerAnimations(slides[0]);
      }
    })();
  </script>
</body>
</html>
