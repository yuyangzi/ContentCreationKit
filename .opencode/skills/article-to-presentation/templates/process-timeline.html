<div class="slide-header" data-animate="fade-up">
  <span class="slide-kicker">{{ slide.eyebrow | default('') }}</span>
  <h1 class="slide-title">{{ slide.title }}</h1>
</div>

<div class="content-panel content-panel--large" style="flex: 1;" data-animate="fade-up">
  <div class="timeline">
    {% for event in slide.data.events %}
    <div class="timeline-item">
      <div class="timeline-dot" style="background: var(--accent-{{ event.color | default('blue') }});"></div>
      <div style="flex: 1;">
        <div style="font-size: 18px; color: var(--accent-{{ event.color | default('blue') }}); font-weight: 600; margin-bottom: 4px;">{{ event.date }}</div>
        <h3 class="item-title" style="margin-bottom: 8px;">{{ event.title }}</h3>
        <p class="small-copy">{{ event.description }}</p>
      </div>
    </div>
    {% endfor %}
  </div>
</div>
