<div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;">
  {% if slide.data.image %}
  <img src="{{ slide.data.image }}" alt="" style="width: 100%; height: 100%; object-fit: cover; opacity: 0.5;">
  {% endif %}
  <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(7,17,31,0.3), rgba(7,17,31,0.9));"></div>
</div>

<div style="position: relative; z-index: 1; height: 100%; display: flex; flex-direction: column; justify-content: flex-end; padding-bottom: 80px;" data-animate="fade-up">
  <span class="eyebrow">{{ slide.eyebrow | default('') }}</span>
  <h1 class="cover-title">{{ slide.title }}</h1>
  <p class="cover-subtitle">{{ slide.subtitle | default('') }}</p>
</div>
