<div style="margin-bottom: 32px;" data-animate="fade-up">
  <span class="eyebrow">{{ slide.eyebrow | default('') }}</span>
  <h1 class="slide-title">{{ slide.title }}</h1>
</div>

<div class="flex gap-8" style="flex: 1;">
  <div class="panel flex-1" data-animate="fade-right">
    <h3 style="font-size: 28px; margin-bottom: 20px; color: var(--accent-{{ slide.data.left.color | default('red') }});">{{ slide.data.left.title }}</h3>
    <div style="font-size: 22px; color: var(--text-secondary); line-height: 1.8; white-space: pre-line;">{{ slide.data.left.content }}</div>
  </div>
  <div class="panel flex-1" data-animate="fade-left">
    <h3 style="font-size: 28px; margin-bottom: 20px; color: var(--accent-{{ slide.data.right.color | default('green') }});">{{ slide.data.right.title }}</h3>
    <div style="font-size: 22px; color: var(--text-secondary); line-height: 1.8; white-space: pre-line;">{{ slide.data.right.content }}</div>
  </div>
</div>
