<div class="text-center" style="height: 100%; display: flex; flex-direction: column; justify-content: center; padding: 0 80px;" data-animate="fade-up">
  <div style="font-size: 120px; line-height: 1; color: var(--accent-orange); opacity: 0.3; margin-bottom: -40px;">“</div>
  <blockquote style="font-size: 48px; font-weight: 600; line-height: 1.5; margin: 0;">
    {{ slide.data.quote }}
  </blockquote>
  {% if slide.data.source %}
  <div class="mt-8 text-secondary" style="font-size: 24px;">— {{ slide.data.source }}</div>
  {% endif %}
</div>
