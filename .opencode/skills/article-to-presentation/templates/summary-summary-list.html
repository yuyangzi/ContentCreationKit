<div style="margin-bottom: 32px;" data-animate="fade-up">
  <span class="eyebrow">{{ slide.eyebrow | default('') }}</span>
  <h1 class="slide-title">{{ slide.title }}</h1>
</div>

<div class="panel" style="flex: 1; display: flex; flex-direction: column; justify-content: center;" data-animate="fade-up">
  <ul style="list-style: none;">
    {% for item in slide.data['items'] %}
    <li style="padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 26px; display: flex; align-items: flex-start; gap: 16px;">
      <span style="color: var(--accent-green); font-weight: 700;">{{ loop.index }}.</span>
      <span>{{ item }}</span>
    </li>
    {% endfor %}
  </ul>
</div>
