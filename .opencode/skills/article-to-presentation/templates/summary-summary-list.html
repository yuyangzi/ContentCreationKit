<div class="slide-header" data-animate="fade-up">
  <span class="slide-kicker">{{ slide.eyebrow | default('') }}</span>
  <h1 class="slide-title">{{ slide.title }}</h1>
</div>

<div class="content-panel content-panel--large" style="flex: 1;" data-animate="fade-up">
  <ul class="item-list">
    {% for item in slide.data['items'] %}
    <li class="item-row">
      <span style="color: var(--accent-green); font-weight: 700;">{{ loop.index }}.</span>
      <span>{{ item }}</span>
    </li>
    {% endfor %}
  </ul>
</div>
