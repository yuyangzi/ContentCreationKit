<div class="slide-header" data-animate="fade-up">
  <span class="slide-kicker">{{ slide.eyebrow | default('') }}</span>
  <h1 class="slide-title">{{ slide.title }}</h1>
</div>

<div class="content-panel content-panel--large" style="flex: 1; align-items: center;" data-animate="fade-up">
  <div class="flex items-center gap-4">
    {% for step in slide.data.steps %}
    <div class="text-center" style="width: 180px;">
      <div class="badge badge-{{ step.color | default('blue') }}" style="margin: 0 auto 16px;">{{ loop.index }}</div>
      <h3 class="item-title" style="font-size: 20px; margin-bottom: 8px;">{{ step.title }}</h3>
      <p class="small-copy" style="font-size: 16px;">{{ step.description }}</p>
    </div>
    {% if not loop.last %}
    <div style="width: 40px; height: 2px; background: rgba(255,255,255,0.1);"></div>
    {% endif %}
    {% endfor %}
  </div>
</div>
