<div style="margin-bottom: 32px;" data-animate="fade-up">
  <span class="eyebrow">{{ slide.eyebrow | default('') }}</span>
  <h1 class="slide-title">{{ slide.title }}</h1>
</div>

<div class="panel" style="flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 40px 48px;" data-animate="fade-up">
  {% for step in slide.data.steps %}
  <div class="flex items-center gap-6" style="margin-bottom: 24px;">
    <div class="badge badge-{{ step.color | default('blue') }}" style="margin: 0; flex-shrink: 0;">{{ loop.index }}</div>
    <div style="flex: 1;">
      <h3 style="font-size: 24px; margin-bottom: 6px;">{{ step.title }}</h3>
      <p style="font-size: 18px; color: var(--text-secondary);">{{ step.description }}</p>
    </div>
  </div>
  {% if not loop.last %}
  <div style="width: 2px; height: 24px; background: rgba(255,255,255,0.1); margin-left: 19px; margin-bottom: 24px;"></div>
  {% endif %}
  {% endfor %}
</div>
