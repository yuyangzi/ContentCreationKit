<div style="margin-bottom: 32px;" data-animate="fade-up">
  <span class="eyebrow">{{ slide.eyebrow | default('') }}</span>
  <h1 class="slide-title">{{ slide.title }}</h1>
</div>

<div class="panel" style="flex: 1; display: flex; flex-direction: column; justify-content: center;" data-animate="fade-up">
  <table style="width: 100%; border-collapse: separate; border-spacing: 0 12px;">
    <thead>
      <tr style="font-size: 18px; color: var(--text-muted); text-align: left;">
        <th style="padding: 12px 16px; width: 18%;">类别</th>
        <th style="padding: 12px 16px; width: 41%;">重构前</th>
        <th style="padding: 12px 16px; width: 41%;">重构后</th>
      </tr>
    </thead>
    <tbody>
      {% for row in slide.data.rows %}
      <tr>
        <td style="padding: 16px; font-weight: 700; color: var(--accent-{{ row.color | default('orange') }});">{{ row.category }}</td>
        <td style="padding: 16px; background: rgba(255,255,255,0.03); border-radius: 10px 0 0 10px; color: var(--text-secondary);">{{ row.before }}</td>
        <td style="padding: 16px; background: rgba(255,255,255,0.03); border-radius: 0 10px 10px 0; color: var(--text-primary);">{{ row.after }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

{% if slide.data.footnote %}
<div class="mt-6 text-muted" style="font-size: 18px;" data-animate="fade-up">
  {{ slide.data.footnote }}
</div>
{% endif %}
