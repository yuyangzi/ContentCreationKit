<div class="slide-shell slide-shell--center" data-animate="fade-up">
  <span class="slide-kicker">{{ slide.eyebrow | default('') }}</span>
  <h1 class="slide-title">{{ slide.title }}</h1>
  <div class="big-number text-{{ slide.data.color | default('orange') }}" data-count="{{ slide.data.value }}" style="margin: 40px 0;">0</div>
  <p class="slide-subtitle">{{ slide.data.label }}</p>
  {% if slide.data.description %}
  <p class="mt-6 text-secondary" style="font-size: 22px;">{{ slide.data.description }}</p>
  {% endif %}
</div>
