<div style="margin-bottom: 24px;" data-animate="fade-up">
  <span class="eyebrow">{{ slide.eyebrow | default('') }}</span>
  <h1 class="slide-title">{{ slide.title }}</h1>
</div>

<div class="panel" style="flex: 1; display: flex; flex-direction: column;" data-animate="fade-up">
  <div id="chart-pie-{{ slide.index }}" style="width: 100%; flex: 1;"></div>
</div>

<script>
  (function() {
    var chartDom = document.getElementById('chart-pie-{{ slide.index }}');
    var myChart = echarts.init(chartDom, 'dark');
    var option = {
      backgroundColor: 'transparent',
      tooltip: { trigger: 'item' },
      legend: { textStyle: { color: '#9aa5b8', fontSize: 14 }, top: 10 },
      series: [{
        type: 'pie',
        radius: '65%',
        center: ['50%', '55%'],
        itemStyle: { borderRadius: 8, borderColor: '#07111f', borderWidth: 2 },
        label: { color: '#fff', fontSize: 16 },
        data: {{ slide.data.series | tojson }}
      }]
    };
    myChart.setOption(option);
    window.addEventListener('resize', function() { myChart.resize(); });
  })();
</script>
