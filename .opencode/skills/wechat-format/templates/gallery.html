<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}} - 主题选择</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: #f5f5f7;
    min-height: 100vh;
}

/* ── Toolbar ── */
.toolbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid #e0e0e0;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 200;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.toolbar-left {
    display: flex;
    align-items: center;
    gap: 16px;
}
.toolbar-title {
    font-size: 15px;
    font-weight: 600;
    color: #1d1d1f;
}
.toolbar-meta {
    font-size: 13px;
    color: #86868b;
}
.toolbar-hint {
    font-size: 13px;
    color: #07c160;
    font-weight: 500;
}

/* ── Main Container ── */
.main-container {
    max-width: 700px;
    margin: 80px auto 40px;
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
}

/* ── Theme Buttons ── */
.theme-buttons {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    max-width: 600px;
}
.theme-group {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
}
.group-label {
    font-size: 12px;
    color: #86868b;
    font-weight: 600;
    min-width: 60px;
    letter-spacing: 0.5px;
}
.theme-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    background: #fff;
    border: 2px solid #e0e0e0;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    color: #333;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
}
.theme-btn:hover {
    border-color: #ccc;
    background: #fafafa;
}
.theme-btn.active {
    border-color: #07c160;
    background: rgba(7,193,96,0.06);
    color: #07c160;
}
.theme-btn.recommended {
    position: relative;
}
.theme-btn.recommended .rec-badge {
    position: absolute;
    top: -8px;
    right: -6px;
    background: #ff9500;
    color: #fff;
    font-size: 10px;
    line-height: 1;
    padding: 2px 5px;
    border-radius: 6px;
    font-weight: 600;
    pointer-events: none;
}
.theme-dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
}

/* ── Phone Frame Preview ── */
.phone-frame {
    width: 100%;
    max-width: 415px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    overflow: hidden;
}
.phone-header {
    background: #ededed;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: #999;
    border-bottom: 1px solid #e0e0e0;
}
.preview-scroll {
    max-height: 600px;
    overflow-y: auto;
    padding: 20px;
}
.theme-preview {
    font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
}

/* ── Color Variants (placeholder) ── */
.color-hint {
    font-size: 13px;
    color: #999;
    text-align: center;
}

/* ── Action Button ── */
.action-btn {
    width: 100%;
    max-width: 415px;
    padding: 14px 0;
    background: #07c160;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
    font-family: inherit;
}
.action-btn:hover { background: #06ae56; }
.action-btn:active { transform: scale(0.99); }
.action-btn.copied {
    background: #34c759;
}

/* ── Font Size Selector ── */
.font-size-selector {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 16px;
    padding: 8px 0;
}
.fs-label {
    font-size: 13px;
    color: #999;
}
.fs-btn {
    padding: 4px 12px;
    border: 1px solid #ddd;
    border-radius: 16px;
    background: #fff;
    font-size: 13px;
    color: #666;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
}
.fs-btn:hover {
    border-color: #07C160;
    color: #07C160;
}
.fs-btn.active {
    background: #07C160;
    border-color: #07C160;
    color: #fff;
}

/* ── Responsive ── */
@media (max-width: 600px) {
    .toolbar { padding: 10px 14px; }
    .toolbar-hint { display: none; }
    .main-container {
        margin-top: 68px;
        padding: 0 12px;
    }
    .theme-buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
        width: 100%;
    }
    .theme-btn {
        justify-content: center;
    }
    .phone-frame {
        border-radius: 0;
        box-shadow: none;
    }
    .preview-scroll {
        max-height: 500px;
    }
}
</style>
</head>
<body>

<!-- ── Toolbar ── -->
<div class="toolbar">
    <div class="toolbar-left">
        <span class="toolbar-title">{{TITLE}}</span>
        <span class="toolbar-meta">{{WORD_COUNT}} 字</span>
    </div>
    <span class="toolbar-hint">选一个你喜欢的风格</span>
</div>

<!-- ── Main Content ── -->
<div class="main-container">

    <!-- Font Size Selector -->
    <div class="font-size-selector">
        <span class="fs-label">字号</span>
        <button class="fs-btn active" data-size="15" onclick="switchFontSize(15)">15px</button>
        <button class="fs-btn" data-size="16" onclick="switchFontSize(16)">16px</button>
    </div>

    <!-- Theme Buttons -->
    <div class="theme-buttons">
{{THEME_BUTTONS}}
    </div>

    <!-- Phone Frame Preview -->
    <div class="phone-frame">
        <div class="phone-header">微信公众号预览</div>
        <div class="preview-scroll" id="previewScroll">
{{THEME_PREVIEWS}}
        </div>
    </div>

    <!-- Action Buttons -->
    <button class="action-btn" id="confirmBtn" onclick="confirmAndCopy()">✓ 确认 — 选中主题后回到 Agent 继续</button>
    <button class="action-btn" id="copyBtn" onclick="applyTheme()" style="background:#86868b;margin-top:8px;">复制内容到剪贴板 去公众号粘贴</button>

</div>

<script>
var selectedTheme = '{{DEFAULT_THEME}}';

function switchTheme(themeId) {
    // Hide all previews
    var previews = document.querySelectorAll('.theme-preview');
    for (var i = 0; i < previews.length; i++) {
        previews[i].style.display = 'none';
    }
    // Show target
    var target = document.querySelector('.theme-preview[data-theme="' + themeId + '"]');
    if (target) {
        target.style.display = 'block';
    }
    // Update button active states
    var btns = document.querySelectorAll('.theme-btn');
    for (var i = 0; i < btns.length; i++) {
        if (btns[i].getAttribute('data-theme') === themeId) {
            btns[i].classList.add('active');
        } else {
            btns[i].classList.remove('active');
        }
    }
    // Persist selection to localStorage
    selectedTheme = themeId;
    try {
        localStorage.setItem('wechat-format-theme', themeId);
    } catch(e) {}
    // Reset confirm button
    var confirmBtn = document.getElementById('confirmBtn');
    if (confirmBtn) {
        confirmBtn.textContent = '✓ 确认 — 选中主题后回到 Agent 继续';
        confirmBtn.classList.remove('copied');
    }
    // Scroll preview to top
    document.getElementById('previewScroll').scrollTop = 0;
}

function copyCurrentPreview() {
    var target = document.querySelector('.theme-preview[data-theme="' + selectedTheme + '"]');
    if (!target) return false;

    // Temporarily make it selectable
    var range = document.createRange();
    range.selectNodeContents(target);
    var sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);

    var success = false;
    try {
        success = document.execCommand('copy');
    } catch(e) {}

    sel.removeAllRanges();

    if (!success) {
        // Fallback: Clipboard API
        var html = target.innerHTML;
        var blob = new Blob([html], { type: 'text/html' });
        var item = new ClipboardItem({ 'text/html': blob });
        navigator.clipboard.write([item]).then(function() {
            showCopied();
        }).catch(function() {
            alert('复制失败，请手动选中文章内容复制');
        });
        return;
    }

    showCopied();
}

function confirmAndCopy() {
    var themeName = '';
    var activeBtn = document.querySelector('.theme-btn.active');
    if (activeBtn) {
        themeName = activeBtn.textContent.replace('推荐', '').trim();
    }
    var btn = document.getElementById('confirmBtn');
    btn.textContent = '✓ 已确认主题：' + themeName;
    btn.classList.add('copied');
}

function applyTheme() {
    copyCurrentPreview();
}

function showCopied() {
    var btn = document.getElementById('copyBtn');
    var themeName = '';
    var activeBtn = document.querySelector('.theme-btn.active');
    if (activeBtn) {
        themeName = activeBtn.textContent.replace('推荐', '').trim();
    }
    btn.textContent = '已复制「' + themeName + '」到剪贴板 ✓';
    btn.classList.add('copied');
    setTimeout(function() {
        btn.textContent = '复制内容到剪贴板 去公众号粘贴';
        btn.classList.remove('copied');
    }, 3000);
}

function switchFontSize(size) {
    // 更新按钮状态
    document.querySelectorAll('.fs-btn').forEach(function(btn) {
        if (parseInt(btn.dataset.size) === size) {
            btn.classList.add('active');
        } else {
            btn.classList.remove('active');
        }
    });

    // 找到所有预览区，修改 p 标签的 font-size
    document.querySelectorAll('.theme-preview').forEach(function(preview) {
        preview.querySelectorAll('p').forEach(function(p) {
            var currentSize = parseInt(window.getComputedStyle(p).fontSize);
            if (currentSize >= 14 && currentSize <= 16) {
                p.style.fontSize = size + 'px';
                p.style.lineHeight = size === 16 ? '1.75' : '1.8';
            }
        });
        // 修改列表项文字
        preview.querySelectorAll('[style*="font-size:15px"]').forEach(function(el) {
            if (el.tagName === 'SPAN' || el.tagName === 'SECTION') {
                el.style.fontSize = size + 'px';
            }
        });
    });

    // 保存选择到 localStorage
    localStorage.setItem('wechat-format-fontsize', size);
}

// 页面加载时恢复上次选择
document.addEventListener('DOMContentLoaded', function() {
    var saved = localStorage.getItem('wechat-format-fontsize');
    if (saved && saved !== '15') {
        switchFontSize(parseInt(saved));
    }
});

// ESC does nothing special here (no overlay)
</script>
</body>
</html>
